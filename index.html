<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranveer Dhillon | Portfolio</title>

  <!-- SEO -->
  <meta name="description" content="Portfolio of Ranveer Dhillon, web developer.">
  <meta name="theme-color" content="#764ba2">

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- Progress Bar -->
  <div id="progress-bar"></div>

  <!-- Header -->
  <header class="navbar">
    <h1>Portfolio</h1>

    <nav>
      <ul class="nav-links">
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>

    <button id="darkToggle" aria-label="Toggle dark mode">🌙</button>
  </header>

  <main>

    <!-- Hero -->
    <section class="hero reveal">
      <h2>Hi, I'm Ranveer</h2>
      <p>
        I am a <span id="typing"></span>
        <span class="cursor">|</span>
      </p>
    </section>

    <!-- About -->
    <section id="about" class="reveal left">
      <h2>About Me</h2>
      <p>Web developer specializing in modern, responsive, and performant applications.</p>
    </section>

    <!-- Projects -->
    <section id="projects" class="reveal">
      <h2>Projects</h2>

      <div class="filters">
        <button data-filter="all">All</button>
        <button data-filter="html">HTML/CSS</button>
        <button data-filter="js">JavaScript</button>
      </div>

      <div class="grid">

        <article class="card reveal zoom" data-category="html">
          <img src="images/project1.webp" alt="Project 1 UI" width="300" height="180">
          <h3>Project 1</h3>
          <p>Responsive HTML/CSS project.</p>
        </article>

        <article class="card reveal zoom" data-category="js">
          <img src="images/studysync.png" alt="Project 2 UI" width="300" height="180">
          <h3>StudySync</h3>
          <p>Task Manager</p>
        </article>

      </div>
    </section>

    <!-- Contact -->
    <section id="contact" class="reveal right">
      <h2>Contact</h2>
      <form id="form">
        <input type="text" placeholder="Name" required>
        <input type="email" placeholder="Email" required>
        <textarea placeholder="Message" required></textarea>
        <button type="submit">Send</button>
      </form>
    </section>

  </main>

  <footer>
    <p>© 2026 Ranveer Dhillon</p>
  </footer>

  <script src="js/script.js" defer></script>

</body>
</html>
