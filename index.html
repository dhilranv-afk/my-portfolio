<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Portfolio</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"></head>
<body>

  <!-- Header -->
  <header>
    <nav class="navbar">
      <h1 class="logo">My Portfolio</h1>
      <ul class="nav-links">
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
      <button id="darkModeToggle">🌙</button>
    </nav>
  </header>

  <!-- Main -->
  <main>

    <!-- Hero -->
    <section class="hero" data-aos="fade-up">
  <h2>Hi, I'm Ranveer</h2>
  <p>
    I am a 
    <span id="typing"></span>
    <span class="cursor">|</span>
  </p>
</section>

    <!-- About -->
    <section id="about" data-aos="fade-right">
      <h2>About Me</h2>
      <p>I am a web developer focused on building responsive and interactive websites.</p>
    </section>

    <!-- Projects -->
    <section id="projects" data-aos="fade-up">
      <h2>Projects</h2>

      <!-- Filter Buttons -->
      <div class="filters">
        <button class="filter-btn" data-filter="all">All</button>
        <button class="filter-btn" data-filter="html">HTML/CSS</button>
        <button class="filter-btn" data-filter="js">JavaScript</button>
      </div>

      <!-- Project Cards -->
      <div class="project-container">

        <div class="project-card" data-aos="zoom-in" data-aos-delay="100">
          <img src="images/project1.jpg" loading="lazy" alt="Project 1">
          <h3>Project 1</h3>
          <p>HTML/CSS project</p>
        </div>

        <div class="project-card" data-aos="zoom-in" data-aos-delay="200">
          <img src="images/project2.jpg" loading="lazy" alt="Project 2">
          <h3>Project 2</h3>
          <p>JavaScript project</p>
        </div>

        <div class="project-card" data-aos="zoom-in" data-aos-delay="300">
          <img src="images/project2.jpg" loading="lazy" alt="Project 2">
          <h3>Project 3</h3>
          <p>JavaScript project</p>
        </div>
      </div>
    </section>

    <!-- Contact -->
    <section id="contact" data-aos="fade-left">
      <h2>Contact</h2>
      <form id="contactForm">
        <input type="text" placeholder="Name" required>
        <input type="email" placeholder="Email" required>
        <textarea placeholder="Message" required></textarea>
        <button type="submit">Send</button>
      </form>
    </section>

  </main>

  <!-- Footer -->
  <footer>
    <p>© 2026 Ranveer Dhillon</p>
  </footer>

  <script src="js/script.js"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script></body>
</html>
