<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranveer Portfolio</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>
<body>

  <!-- Scroll Progress -->
  <div id="progress-bar"></div>

  <!-- Navbar -->
  <header>
    <nav class="navbar">
      <h1>Portfolio</h1>
      <ul class="nav-links">
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
      <button id="darkModeToggle">🌙</button>
    </nav>
  </header>

  <main>

    <!-- Hero -->
    <section class="hero" data-aos="fade-up">
      <h2>Hi, I'm Ranveer</h2>
      <p>
        I am a 
        <span id="typing"></span>
        <span class="cursor">|</span>
      </p>
    </section>

    <!-- About -->
    <section id="about" data-aos="fade-right">
      <h2>About Me</h2>
      <p>Web developer focused on responsive and interactive applications.</p>
    </section>

    <!-- Projects -->
    <section id="projects" data-aos="fade-up">
      <h2>Projects</h2>

      <div class="filters">
        <button class="filter-btn" data-filter="all">All</button>
        <button class="filter-btn" data-filter="html">HTML/CSS</button>
        <button class="filter-btn" data-filter="js">JavaScript</button>
      </div>

      <div class="project-container">

        <div class="project-card" data-category="html" data-aos="zoom-in">
          <img src="images/project1.jpg" loading="lazy" alt="Project 1">
          <h3>Project 1</h3>
          <p>HTML/CSS Project</p>
        </div>

        <div class="project-card" data-category="js" data-aos="zoom-in" data-aos-delay="150">
          <img src="images/project2.jpg" loading="lazy" alt="Project 2">
          <h3>Project 2</h3>
          <p>JavaScript Project</p>
        </div>

      </div>
    </section>

    <!-- Contact -->
    <section id="contact" data-aos="fade-left">
      <h2>Contact</h2>
      <form id="contactForm">
        <input type="text" placeholder="Name" required>
        <input type="email" placeholder="Email" required>
        <textarea placeholder="Message" required></textarea>
        <button type="submit">Send</button>
      </form>
    </section>

  </main>

  <footer>
    <p>© 2026 Ranveer Dhillon</p>
  </footer>

  <!-- JS -->
  <script src="js/script.js"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

</body>
</html>
